bench = false

# post-1.0 hardening — coverage gaps surfaced by audit: SM3 was only reached
# indirectly via parsers; the gmcrypto-c C ABI shim had no fuzz target at all.
[[bin]]
name = "fuzz_sm3"
path = "fuzz_targets/fuzz_sm3.rs"
test = false
doc = false
bench = false

[[bin]]
name = "fuzz_c_abi"
path = "fuzz_targets/fuzz_c_abi.rs"
test = false
doc = false
bench = false

# post-1.0 hardening — encrypt-side + MAC coverage. The pre-existing SM4
# targets only fuzz the decrypt path; these add differential single-shot vs
# streaming oracles for the encrypt side, plus HMAC-SM3 (one-shot/streaming +
# verify). CCM/XTS have no streaming API, so an encrypt->decrypt round-trip is
# the natural follow-up there.
[[bin]]
name = "fuzz_sm4_cbc_encrypt"
path = "fuzz_targets/fuzz_sm4_cbc_encrypt.rs"
test = false
doc = false
bench = false

[[bin]]
name = "fuzz_sm4_gcm_encrypt"
path = "fuzz_targets/fuzz_sm4_gcm_encrypt.rs"
test = false
doc = false
bench = false

[[bin]]
name = "fuzz_hmac_sm3"
path = "fuzz_targets/fuzz_hmac_sm3.rs"
test = false
doc = false
bench = false

# CCM/XTS have no streaming API, so these are encrypt->decrypt round-trip
# oracles (decrypt recovers the plaintext; AEAD rejects a tampered tag).
[[bin]]
name = "fuzz_sm4_ccm_encrypt"
path = "fuzz_targets/fuzz_sm4_ccm_encrypt.rs"
test = false
doc = false
bench = false

[[bin]]
name = "fuzz_sm4_xts_encrypt"
path = "fuzz_targets/fuzz_sm4_xts_encrypt.rs"
test = false
doc = false
bench = false

# v0.14 — its own workspace so it is excluded from the parent.
[workspace]
