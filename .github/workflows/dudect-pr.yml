name: dudect smoke (PR gate)

on:
  pull_request:
    branches: [main]
    # Allowlist: only run when crypto code, the bench harness, or this
    # workflow itself changes. Skips doc-only and test-only PRs.
    paths:
      - 'crates/gmcrypto-core/src/**'
      - 'crates/gmcrypto-core/Cargo.toml'
      - 'crates/gmcrypto-core/benches/**'
      - 'Cargo.toml'
      - 'Cargo.lock'
      - '.github/workflows/dudect-pr.yml'

# Cancel outdated runs on the same PR ref. Critical during
# rapid-iteration cycles where a PR receives multiple force-pushes
# in quick succession — each bench run is ~5-8 min on ubuntu-latest
# at the 10K-sample budget, so stale runs would burn billed minutes.
concurrency:
  group: dudect-pr-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always

jobs:
  smoke:
    name: timing-leak smoke (10K samples, |tau|<0.20, features=${{ matrix.features }})
    runs-on: ubuntu-latest
    # Skip-CI gate. GitHub's native `[skip ci]` handles push events but
    # not pull_request — this is exclusively a pull_request workflow, so
    # the explicit gate is what actually skips the run. Checks both PR
    # title and head commit message; the latter is null on PR events but
    # `contains(null, ...)` is false so it never blocks erroneously.
    if: >-
      !contains(github.event.pull_request.title, '[skip ci]') &&
      !contains(github.event.pull_request.title, '[ci skip]') &&
      !contains(github.event.pull_request.title, '[no ci]') &&
      !contains(github.event.pull_request.title, '[skip actions]') &&
      !contains(github.event.head_commit.message, '[skip ci]') &&
      !contains(github.event.head_commit.message, '[ci skip]') &&
      !contains(github.event.head_commit.message, '[no ci]') &&
      !contains(github.event.head_commit.message, '[skip actions]')
    timeout-minutes: 10
    strategy:
      fail-fast: false
      matrix:
        # v0.4 W3 — second pass under `sm4-bitsliced` exercises the
        # bitsliced S-box gate sequence. `ct_sm4_encrypt_block` and
        # `ct_sm4_key_schedule` swap to the bitsliced path under this
        # feature; the same `|tau| < 0.20` gate applies.
        # v0.5 W4 (phase 1) — third pass under `sm4-bitsliced-simd`
        # exercises the SIMD-packed-bitsliced dispatch path. Phase 1
        # transparently delegates to the single-block bitslice
        # (byte-identical output); phase 2 / phase 3 swap in AVX2 /
        # NEON intrinsics. The new `ct_sm4_encrypt_block_bitsliced_simd`
        # target is feature-gated and gates at `|tau| < 0.20`.
        features:
          - "default"
          - "sm4-bitsliced"
          - "sm4-bitsliced-simd"
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: gmcrypto-stable-${{ matrix.features }}

      # v0.5 W4 phase 2 prep — capture runner environment so that
      # future calibration drifts (kernel / runner-image / Rust
      # toolchain) can be correlated with `|tau|` shifts. See
      # `docs/v0.5-dudect-recalibration.md` for the 2026-05-12
      # `ubuntu-24.04` runner-image drift that motivated this.
      - name: Capture runner environment (for noise-floor correlation)
        run: |
          set +e
          echo "=== Runner image ==="
          echo "ImageVersion: ${ImageVersion:-<unset>}"
          echo "ImageOS:      ${ImageOS:-<unset>}"
          echo
          echo "=== Kernel ==="
          uname -a
          echo
          echo "=== CPU ==="
          lscpu 2>/dev/null | head -30 || cat /proc/cpuinfo | head -25
          echo
          echo "=== CPU governor / turbo state ==="
          for cpu in /sys/devices/system/cpu/cpu0/cpufreq/scaling_governor; do
            [ -r "$cpu" ] && echo "$cpu = $(cat "$cpu")"
          done
          [ -r /sys/devices/system/cpu/intel_pstate/no_turbo ] && \
            echo "intel_pstate/no_turbo = $(cat /sys/devices/system/cpu/intel_pstate/no_turbo)"
          echo
          echo "=== Rust ==="
          rustc -Vv
          cargo -V

      - name: Run dudect harness (smoke budget)
        env:
          DUDECT_SAMPLES: "10000"
          MATRIX_FEATURES: ${{ matrix.features }}
        run: |
          set -euxo pipefail
          # v0.5 W5 — the bench `Sm2PrivateKey::from_scalar(U256)` callsites
          # require `crypto-bigint-scalar`; combine it with the matrix's
          # SM4 feature when needed.
          if [ "$MATRIX_FEATURES" = "default" ]; then
            cargo bench --bench timing_leaks --features crypto-bigint-scalar 2>&1 | tee dudect.log
          else
            cargo bench --bench timing_leaks --features "$MATRIX_FEATURES,crypto-bigint-scalar" 2>&1 | tee dudect.log
          fi

      - name: Parse and gate
        run: |
          python3 - <<'PY'
          # Output format from dudect-bencher, one line per bench:
          #   bench <name>           : n == +X.XXXM, max t = +X.XXXXX, max tau = +X.XXXXX, ...
          # We gate on |tau| (scale-free) rather than |t| (grows with sqrt(N)).
          import re, sys, pathlib

          log = pathlib.Path("dudect.log").read_text()
          pat = re.compile(
              r"^bench\s+(\S+)\s*\.+\s*:.*?max tau\s*=\s*([+\-]?\d+\.\d+)",
              re.M,
          )
          findings = {m.group(1): abs(float(m.group(2))) for m in pat.finditer(log)}

          assert findings, f"no tau values parsed; harness output:\n{log[-1000:]}"

          # negative_control MUST flag (large |tau|) — confirms harness wiring.
          # Real targets MUST stay below the noise threshold.
          required_high = {"negative_control": 1.0}
          # 0.20 chosen empirically: 8 sample runs on macOS desktop (noisier
          # than typical Linux CI) showed worst-case |tau| of 0.152 for
          # ct_mul_var. 0.20 gives ~30% headroom over observed noise. A
          # real timing leak (e.g. crypto-bigint::invert at |tau|=0.70 in
          # isolation) would fire well above this. v0.2 will tighten once
          # CI runner baseline data is available.
          required_low  = {
              # v0.1 baseline targets.
              "ct_mul_g": 0.20,
              "ct_mul_var": 0.20,
              "ct_sign": 0.20,
              # v0.2 W0 — nonce-class split (closes the v0.1 structural blind spot)
              # plus direct invert diagnostics (drives the W5 Fermat-invert
              # decision tree; sign-level dudect dilutes invert by ~50x).
              # v0.4 release-prep — `ct_sign_k_class` is deliberately
              # ABSENT from this PR-smoke allowlist. At 10K samples on
              # the GH Actions ubuntu-24.04 runner image, the composite
              # measurement is too noisy to gate reliably: observed
              # values across seven recent runs span [0.21–0.37], with
              # no detectable structure tied to code changes. The 100K
              # nightly gate (see dudect-nightly.yml) remains at 0.25
              # for `ct_sign_k_class`, where the signal-to-noise ratio
              # is meaningful. Dropping it from PR-smoke is the honest
              # framing — chasing a higher gate would turn this into
              # an effectively unenforced rule. The bench still runs
              # (so the data lands in the artifact log) but doesn't
              # gate.
              #
              # v0.5 W4 phase 2 prep — `ct_fn_invert` and `ct_fp_invert`
              # also moved to telemetry-only at the PR-smoke budget.
              # The 2026-05-12 GH Actions `ubuntu-24.04` runner-image
              # update (image `20260413.86.1` → `20260512.134.1`,
              # kernel `6.17.0-1010-azure` → `6.17.0-1013-azure`,
              # Rust toolchain `1.94.1` → `1.95.0`; see
              # https://github.com/actions/runner-images/releases)
              # shifted the noise floor on these two direct invert
              # diagnostics: 100K-sample nightlies on `main` started
              # producing `|tau|` values in [0.29–0.40] intermittently
              # on the same commits that had measured [0.006–0.020] a
              # few days earlier, with same-commit pass/fail across
              # consecutive runs (data in
              # `docs/v0.5-dudect-recalibration.md`). At 10K samples
              # the effect is even stronger. Gating these at 0.20
              # on the PR-smoke produces flaky failures that don't
              # correspond to code changes. The nightly retains a
              # gross-regression sentinel at `|tau| ≥ 0.55` for
              # both targets (catches a real leak like the v0.1
              # `crypto-bigint 0.6 ConstMontyForm::invert` at
              # `|tau| ≈ 0.70`); the PR-smoke prints values as
              # telemetry without gating. The authoritative fix
              # would be a pinned / noise-isolated dudect runner;
              # that's deferred to a future scope doc.
              # v0.2 W1 — SM4 timing surfaces. Key schedule and encrypt
              # share an S-box-and-linear-transform pipeline; both run on
              # secret-derived state.
              "ct_sm4_key_schedule": 0.20,
              "ct_sm4_encrypt_block": 0.20,
              # v0.2 W3 — HMAC-SM3 keyed MAC. Covers the inner PRF for
              # PBKDF2-HMAC-SM3 (W4); no separate W4 target.
              "ct_hmac_sm3": 0.20,
              # v0.2 W2 — SM2 decrypt, class-split by recipient d_B.
              # Ciphertext is encrypted to a third party so both classes
              # fail at the MAC check via identical control flow; only
              # d_B's bits drive any timing differential.
              "ct_sm2_decrypt": 0.20,
              # v0.3 W2 — encrypted-PKCS#8 decrypt, class-split by
              # password bytes. Both classes' blobs are valid for their
              # password so both succeed via identical control flow.
              "ct_pkcs8_decrypt": 0.20,
          }
          # v0.5 W4 — extra target only present under
          # `sm4-bitsliced-simd`. Phase 1 measures the same byte
          # sequence as `ct_sm4_encrypt_block` (transparent delegate);
          # the gate stays at 0.20 across the three-phase rollout.
          import os
          if os.environ.get("MATRIX_FEATURES") == "sm4-bitsliced-simd":
              required_low["ct_sm4_encrypt_block_bitsliced_simd"] = 0.20
              # v0.6 W6 — CBC-decrypt SIMD-fanout target (Q6.7 of
              # docs/v0.6-scope.md). Exercises the
              # Sm4CbcDecryptor::decrypt_batch path through sbox_x32
              # (AVX2) / sbox_x16 (NEON). Same 0.20 gate as the rest
              # of the SM4 surface; class-split by master key.
              required_low["ct_sm4_cbc_decrypt_fanout"] = 0.20

          # v0.5 W4 phase 2 prep — telemetry-only targets. The data
          # lands in the CI log for trend tracking but doesn't gate
          # on the PR-smoke budget. See `required_low`'s big comment
          # above for the runner-image-drift rationale.
          telemetry_only = ["ct_fn_invert", "ct_fp_invert", "ct_sign_k_class"]

          fail = False
          for name, lower_bound in required_high.items():
              tau = findings.get(name)
              if tau is None:
                  print(f"FAIL: {name} not measured"); fail = True
              elif tau <= lower_bound:
                  print(f"FAIL: {name} |tau|={tau:.4f} <= {lower_bound} — harness broken")
                  fail = True
              else:
                  print(f"OK:   {name} |tau|={tau:.4f} (must be > {lower_bound})")
          for name, upper_bound in required_low.items():
              tau = findings.get(name)
              if tau is None:
                  print(f"FAIL: {name} not measured"); fail = True
              elif tau > upper_bound:
                  print(f"FAIL: {name} |tau|={tau:.4f} > {upper_bound} — timing leak")
                  fail = True
              else:
                  print(f"OK:   {name} |tau|={tau:.4f} (must be < {upper_bound})")
          # Telemetry-only: print measured |tau| with no pass/fail gate.
          # Prefix with `TELEMETRY:` so log readers can grep it out
          # from the gating lines above.
          for name in telemetry_only:
              tau = findings.get(name)
              if tau is None:
                  print(f"TELEMETRY: {name} not measured")
              else:
                  print(f"TELEMETRY: {name} |tau|={tau:.4f} (non-blocking)")
          sys.exit(1 if fail else 0)
          PY

      - name: Upload raw log
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: dudect-pr-log-${{ matrix.features }}
          path: dudect.log
          retention-days: 7
