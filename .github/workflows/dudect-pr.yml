name: dudect smoke (PR gate)

on:
  pull_request:
    branches: [main]
    # Allowlist: only run when crypto code, the bench harness, or this
    # workflow itself changes. Skips doc-only and test-only PRs.
    paths:
      - 'crates/gmcrypto-core/src/**'
      - 'crates/gmcrypto-core/Cargo.toml'
      - 'crates/gmcrypto-core/benches/**'
      - 'Cargo.toml'
      - 'Cargo.lock'
      - '.github/workflows/dudect-pr.yml'

concurrency:
  group: dudect-pr-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always

jobs:
  smoke:
    name: timing-leak smoke (10K samples, |tau|<0.20)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          # Share cache with the main CI build job
          shared-key: gmcrypto-stable

      - name: Run dudect harness (smoke budget)
        env:
          DUDECT_SAMPLES: "10000"
        run: |
          set -euxo pipefail
          cargo bench --bench timing_leaks 2>&1 | tee dudect.log

      - name: Parse and gate
        run: |
          python3 - <<'PY'
          # Output format from dudect-bencher, one line per bench:
          #   bench <name>           : n == +X.XXXM, max t = +X.XXXXX, max tau = +X.XXXXX, ...
          # We gate on |tau| (scale-free) rather than |t| (grows with sqrt(N)).
          import re, sys, pathlib

          log = pathlib.Path("dudect.log").read_text()
          pat = re.compile(
              r"^bench\s+(\S+)\s*\.+\s*:.*?max tau\s*=\s*([+\-]?\d+\.\d+)",
              re.M,
          )
          findings = {m.group(1): abs(float(m.group(2))) for m in pat.finditer(log)}

          assert findings, f"no tau values parsed; harness output:\n{log[-1000:]}"

          # negative_control MUST flag (large |tau|) — confirms harness wiring.
          # Real targets MUST stay below the noise threshold.
          required_high = {"negative_control": 1.0}
          # 0.20 chosen empirically: 8 sample runs on macOS desktop (noisier
          # than typical Linux CI) showed worst-case |tau| of 0.152 for
          # ct_mul_var. 0.20 gives ~30% headroom over observed noise. A
          # real timing leak (e.g. crypto-bigint::invert at |tau|=0.70 in
          # isolation) would fire well above this. v0.2 will tighten once
          # CI runner baseline data is available.
          required_low  = {
              # v0.1 baseline targets.
              "ct_mul_g": 0.20,
              "ct_mul_var": 0.20,
              "ct_sign": 0.20,
              # v0.2 W0 — nonce-class split (closes the v0.1 structural blind spot)
              # plus direct invert diagnostics (drives the W5 Fermat-invert
              # decision tree; sign-level dudect dilutes invert by ~50x).
              "ct_sign_k_class": 0.20,
              "ct_fn_invert": 0.20,
              "ct_fp_invert": 0.20,
          }

          fail = False
          for name, lower_bound in required_high.items():
              tau = findings.get(name)
              if tau is None:
                  print(f"FAIL: {name} not measured"); fail = True
              elif tau <= lower_bound:
                  print(f"FAIL: {name} |tau|={tau:.4f} <= {lower_bound} — harness broken")
                  fail = True
              else:
                  print(f"OK:   {name} |tau|={tau:.4f} (must be > {lower_bound})")
          for name, upper_bound in required_low.items():
              tau = findings.get(name)
              if tau is None:
                  print(f"FAIL: {name} not measured"); fail = True
              elif tau > upper_bound:
                  print(f"FAIL: {name} |tau|={tau:.4f} > {upper_bound} — timing leak")
                  fail = True
              else:
                  print(f"OK:   {name} |tau|={tau:.4f} (must be < {upper_bound})")
          sys.exit(1 if fail else 0)
          PY

      - name: Upload raw log
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: dudect-pr-log
          path: dudect.log
          retention-days: 7
