name: dudect smoke (PR gate)

on:
  pull_request:
    branches: [main]
    # Allowlist: only run when crypto code, the bench harness, or this
    # workflow itself changes. Skips doc-only and test-only PRs.
    paths:
      - 'crates/gmcrypto-core/src/**'
      - 'crates/gmcrypto-core/Cargo.toml'
      - 'crates/gmcrypto-core/benches/**'
      # The SIMD backend drives the cfg-gated CT targets
      # (ct_sm4_*_bitsliced_simd, ct_sm4_cbc_decrypt_fanout, the AEAD/XTS
      # paths via ghash), so a change there must trigger the smoke too.
      - 'crates/gmcrypto-simd/src/**'
      - 'crates/gmcrypto-simd/Cargo.toml'
      - 'Cargo.toml'
      - 'Cargo.lock'
      - '.github/workflows/dudect-pr.yml'

# Cancel outdated runs on the same PR ref. Critical during
# rapid-iteration cycles where a PR receives multiple force-pushes
# in quick succession — each bench run is ~5-8 min on ubuntu-latest
# at the 10K-sample budget, so stale runs would burn billed minutes.
concurrency:
  group: dudect-pr-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always

jobs:
  smoke:
    name: timing-leak smoke (10K×3 median, |tau|<0.20, features=${{ matrix.features }})
    # v0.18 W1 — pinned `ubuntu-24.04` (OS-label pin, was `ubuntu-latest`):
    # freezes the OS-major axis against the future `ubuntu-latest`→26.04 roll.
    # The load-bearing drift fix is the exact toolchain pin below; the
    # multi-run median absorbs the residual 24.04 image-refresh noise. The
    # gate stays on the 24.04 noise floor it was calibrated against. See
    # docs/v0.18-scope.md Q18.3 + docs/v0.5-dudect-recalibration.md.
    runs-on: ubuntu-24.04
    # Skip-CI gate. GitHub's native `[skip ci]` handles push events but
    # not pull_request — this is exclusively a pull_request workflow, so
    # the explicit gate is what actually skips the run. Checks both PR
    # title and head commit message; the latter is null on PR events but
    # `contains(null, ...)` is false so it never blocks erroneously.
    if: >-
      !contains(github.event.pull_request.title, '[skip ci]') &&
      !contains(github.event.pull_request.title, '[ci skip]') &&
      !contains(github.event.pull_request.title, '[no ci]') &&
      !contains(github.event.pull_request.title, '[skip actions]') &&
      !contains(github.event.head_commit.message, '[skip ci]') &&
      !contains(github.event.head_commit.message, '[ci skip]') &&
      !contains(github.event.head_commit.message, '[no ci]') &&
      !contains(github.event.head_commit.message, '[skip actions]')
    timeout-minutes: 10
    strategy:
      fail-fast: false
      matrix:
        # v0.4 W3 — second pass under `sm4-bitsliced` exercises the
        # bitsliced S-box gate sequence. `ct_sm4_encrypt_block` and
        # `ct_sm4_key_schedule` swap to the bitsliced path under this
        # feature; the same `|tau| < 0.20` gate applies.
        # v0.5 W4 (phase 1) — third pass under `sm4-bitsliced-simd`
        # exercises the SIMD-packed-bitsliced dispatch path. Phase 1
        # transparently delegates to the single-block bitslice
        # (byte-identical output); phase 2 / phase 3 swap in AVX2 /
        # NEON intrinsics. The new `ct_sm4_encrypt_block_bitsliced_simd`
        # target is feature-gated and gates at `|tau| < 0.20`.
        # v0.8 W4 — fourth pass under `sm4-bitsliced-simd,sm4-aead`
        # exercises the most-demanding cipher-stack combination:
        # SIMD-packed-bitsliced SM4 under SM4-GCM and SM4-CCM. New
        # targets `ct_sm4_gcm_decrypt` and `ct_sm4_ccm_decrypt` are
        # cfg-gated on `sm4-aead`; same `|tau| < 0.20` gate.
        # v0.12 W3 — the fourth pass also carries `sm4-xts`, gating the
        # `ct_sm4_xts_decrypt` target (cfg-gated on `sm4-xts`) at a CTS
        # data-unit length; same `|tau| < 0.20` gate.
        features:
          - "default"
          - "sm4-bitsliced"
          - "sm4-bitsliced-simd"
          - "sm4-bitsliced-simd,sm4-aead,sm4-xts"
    steps:
      - uses: actions/checkout@v4
      # v0.18 W1 — PINNED (was @stable). The toolchain is the load-bearing
      # drift axis: the 2026-05-12 ubuntu-24.04 image refresh rolled Rust
      # 1.94.1 → 1.95.0 and shifted the ct_fn_invert / ct_fp_invert noise
      # floor (docs/v0.5-dudect-recalibration.md). Pin captured empirically
      # from the "Capture runner environment" rustc -Vv; MUST be >= MSRV 1.85.
      # A DELIBERATE bump is a reviewed re-baseline: bump here, dispatch the
      # nightly several times, confirm medians stable, record the new floor
      # (with ImageVersion + kernel) in docs/v0.5-dudect-recalibration.md.
      # See docs/v0.18-scope.md Q18.4.
      - uses: dtolnay/rust-toolchain@1.95.0
      - uses: Swatinem/rust-cache@v2
        with:
          # Keyed on the matrix job-index (0-3), NOT ${{ matrix.features }}:
          # the 4th leg's feature string contains commas
          # (sm4-bitsliced-simd,sm4-aead,sm4-xts) and Swatinem/rust-cache
          # rejects commas in `shared-key`
          # (ValidationError: Key ... cannot contain commas), so that leg's
          # build cache was never restored. job-index keeps each leg's cache
          # distinct; the job NAME still carries the human-readable features=.
          shared-key: gmcrypto-stable-${{ strategy.job-index }}

      # v0.5 W4 phase 2 prep — capture runner environment so that
      # future calibration drifts (kernel / runner-image / Rust
      # toolchain) can be correlated with `|tau|` shifts. See
      # `docs/v0.5-dudect-recalibration.md` for the 2026-05-12
      # `ubuntu-24.04` runner-image drift that motivated this.
      - name: Capture runner environment (for noise-floor correlation)
        run: |
          set +e
          echo "=== Runner image ==="
          echo "ImageVersion: ${ImageVersion:-<unset>}"
          echo "ImageOS:      ${ImageOS:-<unset>}"
          echo
          echo "=== Kernel ==="
          uname -a
          echo
          echo "=== CPU ==="
          lscpu 2>/dev/null | head -30 || cat /proc/cpuinfo | head -25
          echo
          echo "=== CPU governor / turbo state ==="
          for cpu in /sys/devices/system/cpu/cpu0/cpufreq/scaling_governor; do
            [ -r "$cpu" ] && echo "$cpu = $(cat "$cpu")"
          done
          [ -r /sys/devices/system/cpu/intel_pstate/no_turbo ] && \
            echo "intel_pstate/no_turbo = $(cat /sys/devices/system/cpu/intel_pstate/no_turbo)"
          echo
          echo "=== Rust ==="
          rustc -Vv
          cargo -V

      - name: Run dudect harness (smoke budget, 3 runs for median)
        env:
          DUDECT_SAMPLES: "10000"
          DUDECT_RUNS: "3"
          MATRIX_FEATURES: ${{ matrix.features }}
        run: |
          set -euxo pipefail
          # v0.18 W1 — multi-run median robustness. The harness emits one
          # `max tau` per target per process; it has NO multi-run logic
          # (timing_leaks.rs is byte-unchanged). We loop the bench DUDECT_RUNS
          # times into numbered logs; the parse step takes the per-target
          # MEDIAN |tau| (robust to the run-to-run variance the 2026-05-12
          # ubuntu-24.04 image update introduced; see
          # docs/v0.5-dudect-recalibration.md). 3×~7.5s at 10K fits the timeout.
          # v0.5 W5 — the bench `Sm2PrivateKey::from_scalar(U256)` callsites
          # require `crypto-bigint-scalar`; combine it with the matrix's
          # SM4 feature when needed.
          if [ "$MATRIX_FEATURES" = "default" ]; then
            FEATURES="crypto-bigint-scalar"
          else
            FEATURES="$MATRIX_FEATURES,crypto-bigint-scalar"
          fi
          for i in $(seq 1 "$DUDECT_RUNS"); do
            echo "=== dudect run $i/$DUDECT_RUNS (features=$FEATURES) ==="
            cargo bench --bench timing_leaks --features "$FEATURES" 2>&1 | tee "dudect-$i.log"
          done

      - name: Parse and gate
        env:
          # Must be re-declared here: `env` is step-scoped, so without this the
          # parse step sees an empty MATRIX_FEATURES and the feature-conditional
          # gates (sm4-bitsliced-simd / sm4-aead / sm4-xts) would never fire.
          MATRIX_FEATURES: ${{ matrix.features }}
        run: |
          python3 - <<'PY'
          # v0.18 W1 — multi-run median gate. Reads dudect-1.log..dudect-N.log
          # (one process per file, one `max tau` per target each), accumulates
          # findings[name]=[|tau|,...], gates the per-target MEDIAN for
          # required_low (robust to the 2026-05-12 ubuntu-24.04 variance) and
          # the MIN for negative_control (must fire EVERY run). We gate on |tau|
          # (scale-free), not |t| (grows with sqrt(N)).
          #
          # Output format from dudect-bencher, one line per bench:
          #   bench <name>  ... : n == +X.XXXM, max t = +X.XXXXX, max tau = +X.XXXXX, ...
          import re, sys, glob, statistics, os

          pat = re.compile(
              r"^bench\s+(\S+)\s*\.+\s*:.*?max tau\s*=\s*([+\-]?\d+\.\d+)",
              re.M,
          )
          logs = sorted(glob.glob("dudect-*.log"))
          assert logs, "no dudect-*.log files found — bench loop did not run"

          findings = {}
          for path in logs:
              text = open(path).read()
              matches = list(pat.finditer(text))
              assert matches, f"no tau values parsed from {path}; tail:\n{text[-1000:]}"
              for m in matches:
                  findings.setdefault(m.group(1), []).append(abs(float(m.group(2))))

          n_runs = len(logs)
          for name, taus in findings.items():
              if len(taus) != n_runs:
                  print(f"WARN: {name} measured {len(taus)}/{n_runs} runs: {taus}")

          def med(name): return statistics.median(findings[name]) if name in findings else None
          def mn(name):  return min(findings[name]) if name in findings else None
          def telem(name):
              taus = findings.get(name)
              if not taus: return "not measured"
              return (f"runs={['%.4f' % t for t in taus]} median={statistics.median(taus):.4f} "
                      f"min={min(taus):.4f} max={max(taus):.4f}")

          # negative_control MUST flag (large |tau|) on EVERY run — gate on MIN.
          required_high = {"negative_control": 1.0}
          # 0.20 chosen empirically: 8 sample runs on macOS desktop (noisier
          # than typical Linux CI) showed worst-case |tau| of 0.152 for
          # ct_mul_var. 0.20 gives ~30% headroom over observed noise. A
          # real timing leak (e.g. crypto-bigint::invert at |tau|=0.70 in
          # isolation) would fire well above this. v0.2 will tighten once
          # CI runner baseline data is available.
          required_low  = {
              # v0.1 baseline targets.
              "ct_mul_g": 0.20,
              "ct_mul_var": 0.20,
              "ct_sign": 0.20,
              # v0.2 W0 — nonce-class split (closes the v0.1 structural blind spot)
              # plus direct invert diagnostics (drives the W5 Fermat-invert
              # decision tree; sign-level dudect dilutes invert by ~50x).
              # v0.4 release-prep — `ct_sign_k_class` is deliberately
              # ABSENT from this PR-smoke allowlist. At 10K samples on
              # the GH Actions ubuntu-24.04 runner image, the composite
              # measurement is too noisy to gate reliably: observed
              # values across seven recent runs span [0.21–0.37], with
              # no detectable structure tied to code changes. The 100K
              # nightly gate (see dudect-nightly.yml) remains at 0.25
              # for `ct_sign_k_class`, where the signal-to-noise ratio
              # is meaningful. Dropping it from PR-smoke is the honest
              # framing — chasing a higher gate would turn this into
              # an effectively unenforced rule. The bench still runs
              # (so the data lands in the artifact log) but doesn't
              # gate.
              #
              # v0.5 W4 phase 2 prep — `ct_fn_invert` and `ct_fp_invert`
              # also moved to telemetry-only at the PR-smoke budget.
              # The 2026-05-12 GH Actions `ubuntu-24.04` runner-image
              # update (image `20260413.86.1` → `20260512.134.1`,
              # kernel `6.17.0-1010-azure` → `6.17.0-1013-azure`,
              # Rust toolchain `1.94.1` → `1.95.0`; see
              # https://github.com/actions/runner-images/releases)
              # shifted the noise floor on these two direct invert
              # diagnostics: 100K-sample nightlies on `main` started
              # producing `|tau|` values in [0.29–0.40] intermittently
              # on the same commits that had measured [0.006–0.020] a
              # few days earlier, with same-commit pass/fail across
              # consecutive runs (data in
              # `docs/v0.5-dudect-recalibration.md`). At 10K samples
              # the effect is even stronger. Gating these at 0.20
              # on the PR-smoke produces flaky failures that don't
              # correspond to code changes. The nightly retains a
              # gross-regression sentinel at `|tau| ≥ 0.55` for
              # both targets (catches a real leak like the v0.1
              # `crypto-bigint 0.6 ConstMontyForm::invert` at
              # `|tau| ≈ 0.70`); the PR-smoke prints values as
              # telemetry without gating. The authoritative fix
              # would be a pinned / noise-isolated dudect runner;
              # that's deferred to a future scope doc.
              # v0.2 W1 — SM4 timing surfaces. Key schedule and encrypt
              # share an S-box-and-linear-transform pipeline; both run on
              # secret-derived state.
              "ct_sm4_key_schedule": 0.20,
              "ct_sm4_encrypt_block": 0.20,
              # v0.7 W3 — SM4-CTR encrypt (Q7.2). Class-split by master
              # key; dispatches into the same Sm4Cipher path as
              # ct_sm4_encrypt_block but exercises the W1 length-flexible
              # encrypt_blocks API (and the SIMD fanout under
              # sm4-bitsliced-simd). Not cfg-gated — runs under all three
              # matrix entries.
              "ct_sm4_ctr_encrypt": 0.20,
              # v0.2 W3 — HMAC-SM3 keyed MAC. Covers the inner PRF for
              # PBKDF2-HMAC-SM3 (W4); no separate W4 target.
              "ct_hmac_sm3": 0.20,
              # v0.2 W2 — SM2 decrypt, class-split by recipient d_B.
              # Ciphertext is encrypted to a third party so both classes
              # fail at the MAC check via identical control flow; only
              # d_B's bits drive any timing differential.
              "ct_sm2_decrypt": 0.20,
              # v0.3 W2 — encrypted-PKCS#8 decrypt, class-split by
              # password bytes. Both classes' blobs are valid for their
              # password so both succeed via identical control flow.
              "ct_pkcs8_decrypt": 0.20,
          }
          # v0.5 W4 — extra target only present under
          # `sm4-bitsliced-simd`. Phase 1 measures the same byte
          # sequence as `ct_sm4_encrypt_block` (transparent delegate);
          # the gate stays at 0.20 across the three-phase rollout.
          matrix_features = os.environ.get("MATRIX_FEATURES", "")
          if "sm4-bitsliced-simd" in matrix_features:
              required_low["ct_sm4_encrypt_block_bitsliced_simd"] = 0.20
              # v0.6 W6 — CBC-decrypt SIMD-fanout target (Q6.7 of
              # docs/v0.6-scope.md). Exercises the
              # Sm4CbcDecryptor::decrypt_batch path through sbox_x32
              # (AVX2) / sbox_x16 (NEON). Same 0.20 gate as the rest
              # of the SM4 surface; class-split by master key.
              required_low["ct_sm4_cbc_decrypt_fanout"] = 0.20
          if "sm4-aead" in matrix_features:
              # v0.8 W4 — SM4-GCM / SM4-CCM decrypt targets (Q8.7 of
              # docs/v0.7-aead-scope.md). Class-split by master key
              # with valid (ct, tag) pairs for both classes — same
              # identical-control-flow shape as ct_sm2_decrypt. Same
              # 0.20 gate.
              required_low["ct_sm4_gcm_decrypt"] = 0.20
              required_low["ct_sm4_ccm_decrypt"] = 0.20
          if "sm4-xts" in matrix_features:
              # v0.12 W3 — SM4-XTS decrypt target (Q12.9 of
              # docs/v0.12-scope.md). Class-split by master key at a CTS
              # (non-block-multiple) length so the final-pair ciphertext-
              # stealing path gates. Same 0.20 gate.
              required_low["ct_sm4_xts_decrypt"] = 0.20

          # v0.5 W4 phase 2 prep — telemetry-only targets. The data
          # lands in the CI log for trend tracking but doesn't gate
          # on the PR-smoke budget. See `required_low`'s big comment
          # above for the runner-image-drift rationale.
          telemetry_only = ["ct_fn_invert", "ct_fp_invert", "ct_sign_k_class"]

          fail = False
          # Completeness: every REQUIRED target must be measured in EVERY run.
          # A target missing from one numbered log (e.g. a malformed line the
          # regex skipped) must FAIL — never silently gate the median/min over
          # a reduced (< n_runs) sample set. WARN above stays for the
          # non-required telemetry targets.
          for name in list(required_high) + list(required_low):
              got = len(findings.get(name, []))
              if got != n_runs:
                  print(f"FAIL: {name} measured {got}/{n_runs} runs (incomplete) — expected all {n_runs}")
                  fail = True
          # required_high: gate on MIN (must fire every run).
          for name, lower_bound in required_high.items():
              v = mn(name)
              if v is None: print(f"FAIL: {name} not measured"); fail = True
              elif v <= lower_bound:
                  print(f"FAIL: {name} min|tau|={v:.4f} <= {lower_bound} — harness broken ({telem(name)})"); fail = True
              else: print(f"OK:   {name} min|tau|={v:.4f} (> {lower_bound}) ({telem(name)})")
          # required_low: gate on MEDIAN (robust to single-run noise).
          for name, upper_bound in required_low.items():
              v = med(name)
              if v is None: print(f"FAIL: {name} not measured"); fail = True
              elif v > upper_bound:
                  print(f"FAIL: {name} median|tau|={v:.4f} > {upper_bound} — timing leak ({telem(name)})"); fail = True
              else: print(f"OK:   {name} median|tau|={v:.4f} (< {upper_bound}) ({telem(name)})")
          # Telemetry-only: print median + all runs, no pass/fail gate.
          for name in telemetry_only:
              print(f"TELEMETRY: {name} {telem(name)} (non-blocking)")

          # v0.19 — relative-gate TELEMETRY (non-blocking). The matched fix-vs-fix
          # probe approach was FALSIFIED at the 100K nightly (W3, 2026-05-30): the
          # probes stay quiet (~0.005) while the class-split targets spike, so the
          # probe cannot track the noise (it lives in the two-input difference, not
          # the operation). The relative gate is therefore non-authoritative
          # everywhere; ct_fn_invert / ct_fp_invert remain in `telemetry_only`
          # above (PR) and on the @0.55 sentinel (nightly). The probes + ratio are
          # printed as a longitudinal diagnostic that documents the class-split
          # noise for a future v0.20 class-split-aware reference. The probes are
          # non-gating (a missing one is reported, not failed). See
          # docs/v0.5-dudect-recalibration.md (v0.19 resolution).
          REL_K = 4.0
          REL_ABS_FLOOR = 0.20
          relative_gate = {"ct_fn_invert": "noise_floor_fn_invert",
                           "ct_fp_invert": "noise_floor_fp_invert"}
          for probe in sorted(set(relative_gate.values())):
              got = len(findings.get(probe, []))
              if got != n_runs:
                  print(f"REL-TELEMETRY: {probe} measured {got}/{n_runs} runs (noise-floor probe; non-blocking)")
          for target, probe in relative_gate.items():
              t, p = med(target), med(probe)
              if t is None or p is None:
                  print(f"REL-TELEMETRY: {target} vs {probe} — not measured (non-blocking)"); continue
              threshold = max(REL_ABS_FLOOR, REL_K * p)
              ratio = (t / p) if p > 0 else float("inf")
              verdict = "would-PASS" if t <= threshold else "would-FAIL"
              print(f"REL-TELEMETRY: {target} median={t:.4f} vs threshold={threshold:.4f} "
                    f"(= max({REL_ABS_FLOOR}, {REL_K}*probe={p:.4f}), ratio={ratio:.2f}) → {verdict} (non-blocking)")
          sys.exit(1 if fail else 0)
          PY

      - name: Upload raw log
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: dudect-pr-log-${{ matrix.features }}
          path: dudect-*.log
          retention-days: 7
