name: dudect nightly (deeper budget)

on:
  push:
    branches: [main]
    # Same allowlist as the PR job — don't re-run nightly on doc-only commits.
    paths:
      - 'crates/gmcrypto-core/src/**'
      - 'crates/gmcrypto-core/Cargo.toml'
      - 'crates/gmcrypto-core/benches/**'
      - 'Cargo.toml'
      - 'Cargo.lock'
      - '.github/workflows/dudect-nightly.yml'
  schedule:
    - cron: '0 5 * * *'  # 05:00 UTC daily
  workflow_dispatch:

concurrency:
  group: dudect-nightly-${{ github.ref }}
  cancel-in-progress: false   # don't cancel a long run

env:
  CARGO_TERM_COLOR: always

jobs:
  full:
    name: timing-leak nightly (100K samples, |tau|<0.20, features=${{ matrix.features }})
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        # v0.4 W3 — second matrix entry under `sm4-bitsliced` exercises
        # the bitsliced S-box gate sequence. Same `|tau| < 0.20` gate
        # applies to both configurations.
        features:
          - "default"
          - "sm4-bitsliced"
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: gmcrypto-stable-${{ matrix.features }}

      - name: Run dudect harness (nightly budget)
        env:
          DUDECT_SAMPLES: "100000"
          MATRIX_FEATURES: ${{ matrix.features }}
        run: |
          set -euxo pipefail
          if [ "$MATRIX_FEATURES" = "default" ]; then
            cargo bench --bench timing_leaks 2>&1 | tee dudect-nightly.log
          else
            cargo bench --bench timing_leaks --features "$MATRIX_FEATURES" 2>&1 | tee dudect-nightly.log
          fi

      - name: Parse and gate
        run: |
          python3 - <<'PY'
          # Same |tau| gate as the PR-smoke job. Nightly's value is the
          # cron schedule (continuous regression watch) and the higher
          # sample count (tighter empirical confidence at the same gate).
          import re, sys, pathlib

          log = pathlib.Path("dudect-nightly.log").read_text()
          pat = re.compile(
              r"^bench\s+(\S+)\s*\.+\s*:.*?max tau\s*=\s*([+\-]?\d+\.\d+)",
              re.M,
          )
          findings = {m.group(1): abs(float(m.group(2))) for m in pat.finditer(log)}

          assert findings, f"no tau values parsed; harness output:\n{log[-1000:]}"

          required_high = {"negative_control": 1.0}
          # 0.20 chosen empirically (matches the smoke gate). See the
          # PR-smoke workflow for the calibration rationale.
          required_low  = {
              # v0.1 baseline targets.
              "ct_mul_g": 0.20,
              "ct_mul_var": 0.20,
              "ct_sign": 0.20,
              # v0.2 W0 — nonce-class split (closes the v0.1 structural blind spot)
              # plus direct invert diagnostics (drives the W5 Fermat-invert
              # decision tree; sign-level dudect dilutes invert by ~50x).
              "ct_sign_k_class": 0.20,
              "ct_fn_invert": 0.20,
              "ct_fp_invert": 0.20,
              # v0.2 W1 — SM4 timing surfaces. Key schedule and encrypt
              # share an S-box-and-linear-transform pipeline; both run on
              # secret-derived state.
              "ct_sm4_key_schedule": 0.20,
              "ct_sm4_encrypt_block": 0.20,
              # v0.2 W3 — HMAC-SM3 keyed MAC. Covers the inner PRF for
              # PBKDF2-HMAC-SM3 (W4); no separate W4 target.
              "ct_hmac_sm3": 0.20,
              # v0.2 W2 — SM2 decrypt, class-split by recipient d_B.
              # Ciphertext is encrypted to a third party so both classes
              # fail at the MAC check via identical control flow; only
              # d_B's bits drive any timing differential.
              "ct_sm2_decrypt": 0.20,
              # v0.3 W2 — encrypted-PKCS#8 decrypt, class-split by
              # password bytes. Both classes' blobs are valid for their
              # password so both succeed via identical control flow.
              "ct_pkcs8_decrypt": 0.20,
          }

          fail = False
          for name, lower_bound in required_high.items():
              tau = findings.get(name)
              if tau is None:
                  print(f"FAIL: {name} not measured"); fail = True
              elif tau <= lower_bound:
                  print(f"FAIL: {name} |tau|={tau:.4f} <= {lower_bound} — harness broken")
                  fail = True
              else:
                  print(f"OK:   {name} |tau|={tau:.4f} (must be > {lower_bound})")
          for name, upper_bound in required_low.items():
              tau = findings.get(name)
              if tau is None:
                  print(f"FAIL: {name} not measured"); fail = True
              elif tau > upper_bound:
                  print(f"FAIL: {name} |tau|={tau:.4f} > {upper_bound} — timing leak")
                  fail = True
              else:
                  print(f"OK:   {name} |tau|={tau:.4f} (must be < {upper_bound})")
          sys.exit(1 if fail else 0)
          PY

      - name: Upload raw log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: dudect-nightly-log-${{ matrix.features }}
          path: dudect-nightly.log
          retention-days: 30
