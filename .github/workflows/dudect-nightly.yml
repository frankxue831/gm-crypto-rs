name: dudect nightly (full budget)

on:
  push:
    branches: [main]
  schedule:
    - cron: '0 5 * * *'  # 05:00 UTC daily
  workflow_dispatch:

concurrency:
  group: dudect-nightly-${{ github.ref }}
  cancel-in-progress: false   # don't cancel a long run

env:
  CARGO_TERM_COLOR: always

jobs:
  full:
    name: timing-leak full (10M samples, |t|<4.5)
    # NOTE: GitHub-hosted ubuntu-latest is shared infrastructure with noisy
    # timing data. The 4.5 threshold may produce spurious failures under
    # load. If this happens repeatedly, migrate to a self-hosted runner with
    # CPU pinning + turbo-off (preferred) before loosening the threshold.
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      - name: Run dudect harness (nightly budget)
        env:
          DUDECT_SAMPLES: "10000000"
        run: |
          set -euxo pipefail
          cargo bench --bench timing_leaks 2>&1 | tee dudect-nightly.log

      - name: Parse and gate
        run: |
          python3 - <<'PY'
          # Output format from dudect-bencher 0.6 is one line per bench:
          #   bench <name>           : n == +X.XXXM, max t = +X.XXXXX, max tau = +X.XXXXX, ...
          import re, sys, pathlib

          log = pathlib.Path("dudect-nightly.log").read_text()
          pat = re.compile(r"^bench\s+(\S+)\s*\.+\s*:.*?max t\s*=\s*([+\-]?\d+\.\d+)", re.M)
          findings = {m.group(1): abs(float(m.group(2))) for m in pat.finditer(log)}

          assert findings, f"no t-values parsed; harness output:\n{log[-1000:]}"

          # Nightly gate (full budget):
          # - negative_control MUST flag (|t| > 4.5).
          # - ct_mul_g, ct_mul_var MUST stay below |t| < 4.5.
          # - ct_sign is EXCLUDED from the strict gate. The dominant signal
          #   in `sign_raw_with_id` at 10M samples is the documented
          #   crypto-bigint::ConstMontyForm::invert non-constant-time
          #   behavior (tau ≈ 0.7 in isolation; diluted in sign).
          #   Tracked for v0.2 fix via Fermat invert. ct_sign's t-value
          #   is reported but does not gate.
          required_high = ["negative_control"]
          required_low  = ["ct_mul_g", "ct_mul_var"]
          informational = ["ct_sign"]

          fail = False
          for name in required_high:
              t = findings.get(name)
              if t is None:
                  print(f"FAIL: {name} not measured"); fail = True
              elif t <= 4.5:
                  print(f"FAIL: {name} |t|={t:.2f} <= 4.5 — harness broken")
                  fail = True
              else:
                  print(f"OK:   {name} |t|={t:.2f} (must be > 4.5)")
          for name in required_low:
              t = findings.get(name)
              if t is None:
                  print(f"FAIL: {name} not measured"); fail = True
              elif t > 4.5:
                  print(f"FAIL: {name} |t|={t:.2f} > 4.5 — timing leak")
                  fail = True
              else:
                  print(f"OK:   {name} |t|={t:.2f} (must be < 4.5)")
          for name in informational:
              t = findings.get(name)
              if t is None:
                  print(f"INFO: {name} not measured")
              else:
                  print(f"INFO: {name} |t|={t:.2f} (informational; not gated, "
                        "see crypto-bigint::invert v0.1 limitation)")
          sys.exit(1 if fail else 0)
          PY

      - name: Upload raw log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: dudect-nightly-log
          path: dudect-nightly.log
          retention-days: 30
