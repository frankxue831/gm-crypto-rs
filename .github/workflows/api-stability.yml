# v0.21 — API-stability guards for the v1.0 readiness audit (docs/v0.21-scope.md Q21.6).
#
# Four legs:
#   1. public-api drift-check (ENFORCED) — regenerate the committed
#      docs/api-baseline/*.txt with the PINNED tool + nightly and `git diff
#      --exit-code`. The cbindgen-header-drift pattern, applied to the Rust API.
#   2. cargo-semver-checks (ENFORCED, >=1.0) — gate HEAD against the last published
#      release (1.0.0). From 1.0 the public API is a binding SemVer contract: a
#      breaking change to the covered surface must be a major bump, so a non-empty
#      report FAILS the job. Flipped enforced after the 1.0.0 publish
#      (docs/v1.0-readiness.md §4 step 7); #[doc(hidden)] items are excluded.
#   3. docs (ENFORCED) — `cargo doc` with -D warnings; allows the one
#      `private_intra_doc_links` lint (intentional internal cross-refs that render
#      as code text on docs.rs — not broken links).
#   4. feature-matrix (ENFORCED) — --no-default-features (no_std) + --all-features.
#
# The C ABI's stability guard remains the cbindgen header drift-check in ci.yml.
# NOT a publish gate; informational/assurance for the readiness audit.
name: api-stability

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: api-stability-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  # PINNED so the committed public-api baseline is reproducible: cargo-public-api
  # output is tied to the rustdoc-JSON format (= the nightly toolchain) and to the
  # tool version. Bumping either is a REVIEWED re-baseline — update both pins and
  # regenerate docs/api-baseline/*.txt with the exact command in the `public-api`
  # job below (see also docs/v1.0-readiness.md §2), then confirm this stays green.
  PUBLIC_API_NIGHTLY: nightly-2026-05-23
  CARGO_PUBLIC_API_VERSION: 0.52.0

jobs:
  public-api:
    name: public-api drift-check (enforced)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install pinned nightly (rustdoc JSON)
        run: rustup toolchain install "$PUBLIC_API_NIGHTLY" --profile minimal
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: api-stability-publicapi
      - name: Install cargo-public-api (pinned)
        run: cargo install cargo-public-api --version "$CARGO_PUBLIC_API_VERSION" --locked
      - name: Regenerate baselines + diff against committed
        run: |
          set -euo pipefail
          cargo "+$PUBLIC_API_NIGHTLY" public-api -p gmcrypto-core --all-features \
            --omit blanket-impls --omit auto-trait-impls --omit auto-derived-impls \
            > docs/api-baseline/gmcrypto-core.txt
          cargo "+$PUBLIC_API_NIGHTLY" public-api -p gmcrypto-simd \
            --omit blanket-impls --omit auto-trait-impls --omit auto-derived-impls \
            > docs/api-baseline/gmcrypto-simd.txt
          echo "::group::public-api diff (empty == no drift)"
          git --no-pager diff -- docs/api-baseline/ || true
          echo "::endgroup::"
          git diff --exit-code -- docs/api-baseline/ \
            || { echo "::error::Public Rust API changed. If intended, regenerate docs/api-baseline/*.txt with the pinned tool+nightly and commit."; exit 1; }

  semver-checks:
    name: cargo-semver-checks (enforced, >=1.0)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Install pinned nightly (semver-checks rustdoc JSON)
        run: rustup toolchain install "$PUBLIC_API_NIGHTLY" --profile minimal
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: api-stability-semver
      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-semver-checks
      # ENFORCED from 1.0 (flipped after the 1.0.0 publish; docs/v1.0-readiness.md §4
      # step 7). No continue-on-error: semver-checks compares HEAD against the latest
      # crates.io release (now 1.0.0), and a breaking change to the SemVer-covered
      # public API FAILS the job — it must instead be a 2.0. #[doc(hidden)] items are
      # excluded, so the internal curve/asn1/traits surface does not gate.
      - name: Enforce no breaking change vs last release
        run: |
          echo "ENFORCED forward gate (>=1.0): HEAD vs the latest crates.io release."
          echo "A breaking change to the SemVer-covered public API fails here and"
          echo "requires a major bump (see docs/v1.0-readiness.md §3.D / §4)."
          cargo semver-checks check-release -p gmcrypto-core --all-features
          cargo semver-checks check-release -p gmcrypto-simd

  docs:
    name: cargo doc (deny warnings + broken intra-doc links)
    runs-on: ubuntu-latest
    env:
      RUSTDOCFLAGS: "-D warnings -A rustdoc::private_intra_doc_links"
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: api-stability-docs
      - name: doc gmcrypto-core (all opt-in features)
        run: cargo doc --no-deps -p gmcrypto-core --features digest-traits,cipher-traits,sm4-bitsliced,sm4-bitsliced-simd,sm4-aead,sm4-xts,crypto-bigint-scalar
      - name: doc gmcrypto-simd
        run: cargo doc --no-deps -p gmcrypto-simd
      # v0.23 W3 — the AEAD/XTS FFI surface is now always-on in gmcrypto-c
      # (the forwarding sm4-aead/sm4-xts cargo features were dropped), so the
      # default build documents the full ABI. NOT regen-header (would run cbindgen).
      - name: doc gmcrypto-c (full ABI always-on; NOT regen-header)
        run: cargo doc --no-deps -p gmcrypto-c

  feature-matrix:
    name: feature matrix (no-default-features / all-features)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: api-stability-featmatrix
      - name: build --no-default-features (no_std posture)
        run: cargo build -p gmcrypto-core --no-default-features
      - name: test --all-features (feature-interaction)
        run: cargo test -p gmcrypto-core --all-features
