name: CI

# v0.5+ — self-hosted runner split.
#
# The five jobs in this workflow (build / msrv / cabi / deny / wasm32)
# all run on a self-hosted macOS aarch64 runner labelled `gmcrypto` —
# privately-hosted to dodge GitHub Pro's 3000-min/month cap while the
# repo is PRIVATE. While private, only trusted users can trigger CI, so
# the self-hosted runner is safe.
#
# >>> BEFORE MAKING THIS REPO PUBLIC (planned at v1.0): migrate all five
# >>> jobs to GitHub-hosted `macos-14`. A self-hosted runner on a public
# >>> repo is remote code execution — any fork PR would run on the host.
# >>> The exact swap (runs-on + cache-setting changes) is staged as a
# >>> ready-to-apply diff in docs/pre-opensource-audit.md (item C1).
#
# The dudect workflows (`dudect-pr.yml`, `dudect-nightly.yml`) DO NOT
# move — they stay on `ubuntu-latest` because the `|tau|` gates were
# empirically calibrated against the GitHub Actions `ubuntu-24.04`
# runner image's noise floor (see the v0.4 release-prep recalibration
# in PR #22 / CLAUDE.md dudect table). Moving them to a different
# host would invalidate the calibration; rebuilding it would mean
# weeks of baseline measurement.
#
# Conventions to keep this workflow stable on the self-hosted runner:
#
# 1. All `dtolnay/rust-toolchain@*` invocations use the `@stable` tag
#    (NOT `@master`). The `@master` ref was observed prompting for
#    sudo on the self-hosted macOS runner; `@stable` is the action's
#    release tag and behaves consistently. The Rust toolchain version
#    is still controlled via the action's `toolchain:` input.
#
# 2. All `Swatinem/rust-cache@v2` invocations set:
#    - `cache-bin: "false"` — the runner's CARGO_HOME bin/ is
#      pre-populated with rustup / clippy / rustfmt at setup time; we
#      don't want CI restores to evict those. (See rust-cache's
#      persistent self-hosted issue.)
#    - `save-if: ${{ github.ref == 'refs/heads/main' }}` — PR runs
#      RESTORE the cache (fast warm builds) but only push-to-main
#      SAVES it. Self-hosted Mac upload to GH's cache backend runs at
#      ~0.2 MB/s — a fresh save is several minutes per job. Save-on-
#      main cuts ~80% of cache-backend traffic with negligible
#      warm-cache regression (push-to-main runs once per merge and
#      refreshes the cache for downstream PRs).

on:
  push:
    branches: [main]
    # Skip doc-only / repo-meta-only changes. The dudect workflows use
    # their own (allowlist) `paths:` filter; this list is the inverse
    # for ci.yml's broader build/test surface.
    paths-ignore:
      - '**/*.md'
      - 'LICENSE'
      - '.gitignore'
      - 'docs/**'                          # scope docs, runbooks, release reviews
      - '.github/ISSUE_TEMPLATE/**'
      - '.github/PULL_REQUEST_TEMPLATE.md'
      - '.github/CODEOWNERS'
  pull_request:
    branches: [main]
    paths-ignore:
      - '**/*.md'
      - 'LICENSE'
      - '.gitignore'
      - 'docs/**'
      - '.github/ISSUE_TEMPLATE/**'
      - '.github/PULL_REQUEST_TEMPLATE.md'
      - '.github/CODEOWNERS'
  # Manual fire — useful for stacked PRs (where the PR base isn't `main`,
  # so the `pull_request: branches: [main]` filter wouldn't fire) and
  # for re-running CI on a branch without an empty-commit push.
  workflow_dispatch:

# Cancel outdated runs on the same ref (branch / PR). Critical during
# rapid-iteration / vibe-coding cycles where a force-push or follow-up
# commit lands seconds after the previous one — without this, both
# runs would occupy a self-hosted slot in sequence.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"

# Skip-CI gate. GitHub honors `[skip ci]` / `[ci skip]` / `[no ci]` /
# `[skip actions]` natively on `push` events (the workflow run is never
# created), but NOT on `pull_request` events. The job-level `if:` below
# closes that gap by checking the PR title and the PR head commit
# message. On push events, both `github.event.pull_request.*` lookups
# return null and `contains(null, ...)` is false, so the gate is a
# no-op there (GitHub's native skip already handled it).
#
# Drop into a YAML anchor so all jobs share the same expression
# without duplicating it five times.
#
# YAML anchors don't work inside GitHub Actions `if:` directly, so the
# expression is repeated per-job below. Keep them in lock-step.

jobs:
  build:
    name: build & test (Rust stable)
    runs-on: [self-hosted, macos, arm64, gmcrypto]
    # Skip-CI gate for `pull_request` events (GitHub natively handles push).
    # Checks the PR title for `[skip ci]` etc. Same expression appears on
    # every job in this workflow — keep them in lock-step.
    if: >-
      !contains(github.event.pull_request.title, '[skip ci]') &&
      !contains(github.event.pull_request.title, '[ci skip]') &&
      !contains(github.event.pull_request.title, '[no ci]') &&
      !contains(github.event.pull_request.title, '[skip actions]') &&
      !contains(github.event.head_commit.message, '[skip ci]') &&
      !contains(github.event.head_commit.message, '[ci skip]') &&
      !contains(github.event.head_commit.message, '[no ci]') &&
      !contains(github.event.head_commit.message, '[skip actions]')
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          # v0.5+ self-hosted runner: don't cache `~/.cargo/bin/`. The
          # default `cache-bin: "true"` setting can delete preexisting
          # binaries from a long-lived runner's CARGO_HOME on restore
          # (rust-cache's persistent self-hosted issue). The runner's
          # CARGO_HOME already has rustup + clippy + rustfmt installed
          # via the one-time setup; we don't want CI restores to evict
          # them.
          cache-bin: "false"
          # Self-hosted Mac runner uploads to GitHub's cache backend at
          # ~0.2 MB/s — a fresh cache save on the wasm32 + build jobs
          # takes 3-5 min each. PRs *restore* the cache on every run
          # but only *save* it when CI fires on a merge to main. Cuts
          # ~80% of total cache-backend traffic with negligible warm-
          # cache regression (the on-main save runs once per merge).
          save-if: ${{ github.ref == 'refs/heads/main' }}
      - name: cargo build (all targets, including bench compile-only)
        run: cargo build --workspace --all-targets
      - name: cargo test (tests + doctests; benches excluded — see dudect-pr.yml)
        run: cargo test --workspace
      # v0.4 W2 — RustCrypto-trait fit, opt-in features. Default-features
      # build above already gates the no-extra-deps shape. This run
      # exercises the digest/cipher trait impls + the rustcrypto_traits
      # integration test (which is `required-features`-gated and only
      # builds when both flags are on).
      - name: cargo test --features digest-traits,cipher-traits
        run: cargo test -p gmcrypto-core --features digest-traits,cipher-traits
      # v0.4 W3 — bitsliced SM4 S-box (Q4.9 / Q4.11 in docs/v0.4-scope.md).
      # Default-features build is unchanged; this exercises the opt-in
      # bitsliced path including the exhaustive-vs-table equivalence test
      # in `sm4::sbox_bitsliced::tests::bitsliced_matches_table`.
      - name: cargo test --features sm4-bitsliced
        run: cargo test -p gmcrypto-core --features sm4-bitsliced
      # v0.5 W4 (phase 1) — `sm4-bitsliced-simd` is the multi-block
      # SIMD-packed dispatch path. Phase 1 transparently delegates to
      # the single-block bitslice; phase 2 / phase 3 swap in AVX2 /
      # NEON intrinsics. The exhaustive equivalence test in
      # `sm4::sbox_bitsliced_simd::tests` guards byte-identical output
      # across all phases.
      - name: cargo test --features sm4-bitsliced-simd
        run: cargo test -p gmcrypto-core --features sm4-bitsliced-simd
      # v0.5 W5 — `crypto-bigint-scalar` exposes `Sm2PrivateKey::from_scalar`.
      # The dudect bench harness uses `from_scalar` (renamed from
      # `new` in v0.5) and `required-features` on it gates this. The
      # test pass here catches `cfg`-conditional code drift.
      - name: cargo test --features crypto-bigint-scalar
        run: cargo test -p gmcrypto-core --features crypto-bigint-scalar
      # v0.8 W2-W3 / v0.9 — SM4-GCM + SM4-CCM AEAD (+ tag-len param +
      # incremental-input buffered GCM). Exercise the feature alone and
      # combined with the SIMD cipher path (the most-demanding stack).
      # Previously uncovered by ci.yml — only the dudect matrix touched
      # sm4-aead.
      - name: cargo test --features sm4-aead
        run: cargo test -p gmcrypto-core --features sm4-aead
      - name: cargo test --features sm4-aead,sm4-bitsliced-simd
        run: cargo test -p gmcrypto-core --features sm4-aead,sm4-bitsliced-simd
      # v0.9 W4 — gmcrypto-c single-shot AEAD FFI (forwarding sm4-aead feature).
      - name: cargo test -p gmcrypto-c --features sm4-aead
        run: cargo test -p gmcrypto-c --features sm4-aead
      - name: cargo fmt --check
        run: cargo fmt --all -- --check
      - name: cargo clippy
        run: cargo clippy --workspace --all-targets -- -D warnings
      - name: cargo clippy --features digest-traits,cipher-traits
        run: cargo clippy -p gmcrypto-core --features digest-traits,cipher-traits --all-targets -- -D warnings
      - name: cargo clippy --features sm4-bitsliced
        run: cargo clippy -p gmcrypto-core --features sm4-bitsliced --all-targets -- -D warnings
      - name: cargo clippy --features sm4-bitsliced-simd
        run: cargo clippy -p gmcrypto-core --features sm4-bitsliced-simd --all-targets -- -D warnings
      - name: cargo clippy --features sm4-aead (full matrix)
        run: cargo clippy -p gmcrypto-core --features sm4-aead,sm4-bitsliced-simd,digest-traits,cipher-traits,crypto-bigint-scalar --all-targets -- -D warnings
      - name: cargo clippy -p gmcrypto-c --features sm4-aead
        run: cargo clippy -p gmcrypto-c --features sm4-aead --all-targets -- -D warnings
      - name: cargo clippy --features crypto-bigint-scalar
        run: cargo clippy -p gmcrypto-core --features crypto-bigint-scalar --all-targets -- -D warnings

  msrv:
    # MSRV-only build check. Behaviour is rust-version-independent, so
    # we don't repeat `cargo test` here — that's the `build` job's role
    # on stable. This row exists solely to prove the crate (and its
    # opt-in feature combos) still compile on the pinned MSRV. Saves
    # ~30s per CI run vs. running the full test+clippy matrix twice.
    # See discussion in rust-lang/api-guidelines#231.
    name: build (Rust 1.85 MSRV)
    runs-on: [self-hosted, macos, arm64, gmcrypto]
    if: >-
      !contains(github.event.pull_request.title, '[skip ci]') &&
      !contains(github.event.pull_request.title, '[ci skip]') &&
      !contains(github.event.pull_request.title, '[no ci]') &&
      !contains(github.event.pull_request.title, '[skip actions]') &&
      !contains(github.event.head_commit.message, '[skip ci]') &&
      !contains(github.event.head_commit.message, '[ci skip]') &&
      !contains(github.event.head_commit.message, '[no ci]') &&
      !contains(github.event.head_commit.message, '[skip actions]')
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust 1.85
        # v0.5 self-hosted CI: switched from `@master` to `@stable`
        # (the action's release tag, NOT the toolchain) so this job
        # uses the same vetted action commit as the other jobs.
        # `@master` was observed prompting for sudo on the self-hosted
        # macOS runner; the cargo-deny job using `@stable` did not.
        # The `toolchain:` parameter still picks the Rust toolchain
        # version per Cargo's MSRV (1.85), unchanged.
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: "1.85"
      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: msrv-1.85
          cache-bin: "false"   # self-hosted: don't evict the runner's CARGO_HOME bin/
          save-if: ${{ github.ref == 'refs/heads/main' }}
      - name: cargo build (all targets)
        run: cargo build --workspace --all-targets
      - name: cargo build with opt-in features
        run: cargo build -p gmcrypto-core --features digest-traits,cipher-traits,sm4-bitsliced,sm4-bitsliced-simd,sm4-aead,crypto-bigint-scalar --all-targets

  cabi:
    name: gmcrypto-c FFI build + header drift
    runs-on: [self-hosted, macos, arm64, gmcrypto]
    if: >-
      !contains(github.event.pull_request.title, '[skip ci]') &&
      !contains(github.event.pull_request.title, '[ci skip]') &&
      !contains(github.event.pull_request.title, '[no ci]') &&
      !contains(github.event.pull_request.title, '[skip actions]') &&
      !contains(github.event.head_commit.message, '[skip ci]') &&
      !contains(github.event.head_commit.message, '[ci skip]') &&
      !contains(github.event.head_commit.message, '[no ci]') &&
      !contains(github.event.head_commit.message, '[skip actions]')
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: cabi-stable
          cache-bin: "false"   # self-hosted: don't evict the runner's CARGO_HOME bin/
          save-if: ${{ github.ref == 'refs/heads/main' }}
      # v0.4 W4 — build the cdylib + staticlib + rlib (default
      # crate-types) without the regen-header feature.
      - name: cargo build -p gmcrypto-c --release
        run: cargo build -p gmcrypto-c --release
      # Q4.12 — committed header drift gate. Re-run cbindgen and
      # `git diff --exit-code` on the header. Fails CI if a developer
      # added or modified an FFI entry point without regenerating the
      # header.
      - name: Regenerate header via cbindgen
        run: cargo build -p gmcrypto-c --features regen-header
      - name: Verify committed header is up-to-date
        run: git diff --exit-code crates/gmcrypto-c/include/gmcrypto.h
      # The c_smoke integration test exercises every FFI entry point
      # via Rust's own extern "C" interop. This is the v0.4 W4
      # cryptographic-correctness gate (Rust-equivalence on every
      # entry point).
      - name: cargo test -p gmcrypto-c
        run: cargo test -p gmcrypto-c
      # v0.9 W4 — the single-shot AEAD FFI surface (gmcrypto_sm4_gcm_* /
      # gmcrypto_sm4_ccm_*) behind the forwarding sm4-aead feature.
      - name: cargo test -p gmcrypto-c --features sm4-aead
        run: cargo test -p gmcrypto-c --features sm4-aead

  deny:
    name: cargo-deny (no forbidden runtime deps)
    runs-on: [self-hosted, macos, arm64, gmcrypto]
    if: >-
      !contains(github.event.pull_request.title, '[skip ci]') &&
      !contains(github.event.pull_request.title, '[ci skip]') &&
      !contains(github.event.pull_request.title, '[no ci]') &&
      !contains(github.event.pull_request.title, '[skip actions]') &&
      !contains(github.event.head_commit.message, '[skip ci]') &&
      !contains(github.event.head_commit.message, '[ci skip]') &&
      !contains(github.event.head_commit.message, '[no ci]') &&
      !contains(github.event.head_commit.message, '[skip actions]')
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      # Prebuilt cargo-deny binary from GitHub Releases via the curated
      # taiki-e/install-action tool list. Replaces `cargo install --locked
      # cargo-deny`, which compiled from source on every CI run (~3 min).
      - name: Install cargo-deny
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-deny@0.19
      # Default deny pass — gates the zero-runtime-deps surface of the
      # default-features build.
      - name: Run cargo-deny (default features, excluding dev-deps)
        run: cargo deny check --exclude-dev
      # v0.4 W2 / Q4.5 + v0.8 W2-W3 — second pass with the runtime opt-in
      # feature flags a downstream consumer might enable (digest/cipher
      # traits, bitsliced, SIMD, AEAD, scalar). gmcrypto-c's build-time
      # `regen-header` feature is deliberately excluded (cbindgen + its
      # transitive tree is build-tool noise, not runtime dep policy).
      # Pulls `digest` / `cipher` / `crypto-common` / `inout` (allowlisted
      # in deny.toml); `sm4-aead` pulls gmcrypto-simd::ghash (no new
      # transitive deps). Uses --features on the workspace-default crate
      # (`gmcrypto-core`).
      - name: Run cargo-deny (runtime opt-in features, excluding dev-deps)
        run: cargo deny --features gmcrypto-core/digest-traits,gmcrypto-core/cipher-traits,gmcrypto-core/sm4-bitsliced,gmcrypto-core/sm4-bitsliced-simd,gmcrypto-core/sm4-aead,gmcrypto-core/crypto-bigint-scalar check --exclude-dev

  wasm32:
    name: build wasm32-unknown-unknown (Rust ${{ matrix.toolchain }})
    runs-on: [self-hosted, macos, arm64, gmcrypto]
    if: >-
      !contains(github.event.pull_request.title, '[skip ci]') &&
      !contains(github.event.pull_request.title, '[ci skip]') &&
      !contains(github.event.pull_request.title, '[no ci]') &&
      !contains(github.event.pull_request.title, '[skip actions]') &&
      !contains(github.event.head_commit.message, '[skip ci]') &&
      !contains(github.event.head_commit.message, '[ci skip]') &&
      !contains(github.event.head_commit.message, '[no ci]') &&
      !contains(github.event.head_commit.message, '[skip actions]')
    timeout-minutes: 10
    strategy:
      fail-fast: false
      matrix:
        toolchain: [stable, "1.85"]
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust ${{ matrix.toolchain }}
        # v0.5 self-hosted CI: switched from `@master` to `@stable`
        # (the action's release tag, NOT the toolchain) so the wasm32
        # job uses the same vetted action commit as the other jobs.
        # `@master` was observed prompting for sudo on the self-hosted
        # macOS runner. The `toolchain:` + `targets:` parameters still
        # do their job.
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ matrix.toolchain }}
          targets: wasm32-unknown-unknown
      # The `targets:` parameter above usually installs the wasm32
      # target for the named toolchain, but on GH-hosted Ubuntu runners
      # it has been observed to land the MSRV toolchain without the
      # target (E0463: "can't find crate for `core`"). Belt-and-braces:
      # explicitly add the target against the matrix toolchain. On the
      # self-hosted Mac runner this is a no-op since both toolchains
      # already have the target pre-installed (see CLAUDE.md
      # "Self-hosted CI runner setup" step 2).
      - name: Ensure wasm32 target is installed for ${{ matrix.toolchain }}
        run: rustup target add wasm32-unknown-unknown --toolchain ${{ matrix.toolchain }}
      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          key: wasm32-${{ matrix.toolchain }}
          cache-bin: "false"   # self-hosted: don't evict the runner's CARGO_HOME bin/
          save-if: ${{ github.ref == 'refs/heads/main' }}
      # v0.4 W1 — caller-supplied RNG only; the core crate does NOT pull
      # getrandom's wasm_js backend into its default dep graph. Build with
      # --no-default-features to mirror the no_std + alloc-only posture
      # wasm callers will use. The reserved `std` feature was removed in
      # v0.5 W5 per Q5.18 (a no-op feature flag has negative documentation
      # value) — the second smoke build is dropped accordingly.
      - name: cargo +${{ matrix.toolchain }} build --target wasm32-unknown-unknown (no default features)
        run: cargo +${{ matrix.toolchain }} build -p gmcrypto-core --target wasm32-unknown-unknown --no-default-features
      # v0.8 / v0.9 — AEAD must also compile on wasm32 (the GHASH
      # dispatch falls back to the software path; no CLMUL/PMULL there).
      - name: cargo +${{ matrix.toolchain }} build --target wasm32-unknown-unknown --features sm4-aead
        run: cargo +${{ matrix.toolchain }} build -p gmcrypto-core --target wasm32-unknown-unknown --no-default-features --features sm4-aead
