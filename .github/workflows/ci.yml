name: CI

# GitHub-hosted runners (macos-14, Apple Silicon / aarch64).
#
# The five jobs (build / msrv / cabi / deny / wasm32) run on GitHub's
# hosted `macos-14` image. Public repos get unmetered Actions minutes,
# so there is no self-hosted runner — and critically, hosted runners
# are the only safe choice for a public repo: a self-hosted runner
# would let any fork PR execute arbitrary code on the host.
#
# The dudect workflows (`dudect-pr.yml`, `dudect-nightly.yml`) stay on
# `ubuntu-latest` — their `|tau|` gates were empirically calibrated
# against the GitHub Actions `ubuntu-24.04` runner-image noise floor
# (see CLAUDE.md dudect table + docs/v0.5-dudect-recalibration.md).
# Moving them to a different host would invalidate the calibration.

on:
  push:
    branches: [main]
    # Skip doc-only / repo-meta-only changes. The dudect workflows use
    # their own (allowlist) `paths:` filter; this list is the inverse
    # for ci.yml's broader build/test surface.
    paths-ignore:
      - '**/*.md'
      - 'LICENSE'
      - '.gitignore'
      - 'docs/**'                          # scope docs, runbooks, release reviews
      - '.github/ISSUE_TEMPLATE/**'
      - '.github/PULL_REQUEST_TEMPLATE.md'
      - '.github/CODEOWNERS'
  pull_request:
    branches: [main]
    paths-ignore:
      - '**/*.md'
      - 'LICENSE'
      - '.gitignore'
      - 'docs/**'
      - '.github/ISSUE_TEMPLATE/**'
      - '.github/PULL_REQUEST_TEMPLATE.md'
      - '.github/CODEOWNERS'
  # Manual fire — useful for stacked PRs (where the PR base isn't `main`,
  # so the `pull_request: branches: [main]` filter wouldn't fire) and
  # for re-running CI on a branch without an empty-commit push.
  workflow_dispatch:

# Cancel outdated runs on the same ref (branch / PR). Avoids two
# concurrent runs when a follow-up commit lands seconds after the
# previous one (force-push / rapid iteration).
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"

# Skip-CI gate. GitHub honors `[skip ci]` / `[ci skip]` / `[no ci]` /
# `[skip actions]` natively on `push` events (the workflow run is never
# created), but NOT on `pull_request` events. The job-level `if:` below
# closes that gap by checking the PR title and the PR head commit
# message. On push events both `github.event.pull_request.*` lookups
# return null and `contains(null, ...)` is false, so the gate is a
# no-op there (GitHub's native skip already handled it). YAML anchors
# don't work inside GitHub Actions `if:`, so the expression is repeated
# per-job — keep them in lock-step.

jobs:
  build:
    name: build & test (Rust stable)
    runs-on: macos-14
    if: >-
      !contains(github.event.pull_request.title, '[skip ci]') &&
      !contains(github.event.pull_request.title, '[ci skip]') &&
      !contains(github.event.pull_request.title, '[no ci]') &&
      !contains(github.event.pull_request.title, '[skip actions]') &&
      !contains(github.event.head_commit.message, '[skip ci]') &&
      !contains(github.event.head_commit.message, '[ci skip]') &&
      !contains(github.event.head_commit.message, '[no ci]') &&
      !contains(github.event.head_commit.message, '[skip actions]')
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
      - name: cargo build (all targets, including bench compile-only)
        run: cargo build --workspace --all-targets
      - name: cargo test (tests + doctests; benches excluded — see dudect-pr.yml)
        run: cargo test --workspace
      # v0.4 W2 — RustCrypto-trait fit, opt-in features. Default-features
      # build above already gates the no-extra-deps shape. This run
      # exercises the digest/cipher trait impls + the rustcrypto_traits
      # integration test (which is `required-features`-gated and only
      # builds when both flags are on).
      - name: cargo test --features digest-traits,cipher-traits
        run: cargo test -p gmcrypto-core --features digest-traits,cipher-traits
      # v0.4 W3 — bitsliced SM4 S-box (Q4.9 / Q4.11 in docs/v0.4-scope.md).
      - name: cargo test --features sm4-bitsliced
        run: cargo test -p gmcrypto-core --features sm4-bitsliced
      # v0.5 W4 — multi-block SIMD-packed dispatch (AVX2 / NEON).
      - name: cargo test --features sm4-bitsliced-simd
        run: cargo test -p gmcrypto-core --features sm4-bitsliced-simd
      # v0.8 W2-W3 / v0.9 — SM4-GCM + SM4-CCM AEAD (+ tag-len param +
      # incremental-input buffered GCM). Exercise the feature alone and
      # combined with the SIMD cipher path (the most-demanding stack).
      - name: cargo test --features sm4-aead
        run: cargo test -p gmcrypto-core --features sm4-aead
      - name: cargo test --features sm4-aead,sm4-bitsliced-simd
        run: cargo test -p gmcrypto-core --features sm4-aead,sm4-bitsliced-simd
      # v0.5 W5 — `crypto-bigint-scalar` exposes `Sm2PrivateKey::from_scalar`.
      - name: cargo test --features crypto-bigint-scalar
        run: cargo test -p gmcrypto-core --features crypto-bigint-scalar
      # v0.9 W4 — gmcrypto-c single-shot AEAD FFI (forwarding sm4-aead feature).
      - name: cargo test -p gmcrypto-c --features sm4-aead
        run: cargo test -p gmcrypto-c --features sm4-aead
      - name: cargo fmt --check
        run: cargo fmt --all -- --check
      - name: cargo clippy
        run: cargo clippy --workspace --all-targets -- -D warnings
      - name: cargo clippy --features digest-traits,cipher-traits
        run: cargo clippy -p gmcrypto-core --features digest-traits,cipher-traits --all-targets -- -D warnings
      - name: cargo clippy --features sm4-bitsliced
        run: cargo clippy -p gmcrypto-core --features sm4-bitsliced --all-targets -- -D warnings
      - name: cargo clippy --features sm4-bitsliced-simd
        run: cargo clippy -p gmcrypto-core --features sm4-bitsliced-simd --all-targets -- -D warnings
      - name: cargo clippy --features sm4-aead (full matrix)
        run: cargo clippy -p gmcrypto-core --features sm4-aead,sm4-bitsliced-simd,digest-traits,cipher-traits,crypto-bigint-scalar --all-targets -- -D warnings
      - name: cargo clippy -p gmcrypto-c --features sm4-aead
        run: cargo clippy -p gmcrypto-c --features sm4-aead --all-targets -- -D warnings
      - name: cargo clippy --features crypto-bigint-scalar
        run: cargo clippy -p gmcrypto-core --features crypto-bigint-scalar --all-targets -- -D warnings

  msrv:
    # MSRV-only build check. Behaviour is rust-version-independent, so
    # we don't repeat `cargo test` here — that's the `build` job's role
    # on stable. This row exists solely to prove the crate (and its
    # opt-in feature combos) still compile on the pinned MSRV.
    name: build (Rust 1.85 MSRV)
    runs-on: macos-14
    if: >-
      !contains(github.event.pull_request.title, '[skip ci]') &&
      !contains(github.event.pull_request.title, '[ci skip]') &&
      !contains(github.event.pull_request.title, '[no ci]') &&
      !contains(github.event.pull_request.title, '[skip actions]') &&
      !contains(github.event.head_commit.message, '[skip ci]') &&
      !contains(github.event.head_commit.message, '[ci skip]') &&
      !contains(github.event.head_commit.message, '[no ci]') &&
      !contains(github.event.head_commit.message, '[skip actions]')
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust 1.85
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: "1.85"
      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: msrv-1.85
      - name: cargo build (all targets)
        run: cargo build --workspace --all-targets
      - name: cargo build with opt-in features
        run: cargo build -p gmcrypto-core --features digest-traits,cipher-traits,sm4-bitsliced,sm4-bitsliced-simd,sm4-aead,crypto-bigint-scalar --all-targets

  cabi:
    name: gmcrypto-c FFI build + header drift
    runs-on: macos-14
    if: >-
      !contains(github.event.pull_request.title, '[skip ci]') &&
      !contains(github.event.pull_request.title, '[ci skip]') &&
      !contains(github.event.pull_request.title, '[no ci]') &&
      !contains(github.event.pull_request.title, '[skip actions]') &&
      !contains(github.event.head_commit.message, '[skip ci]') &&
      !contains(github.event.head_commit.message, '[ci skip]') &&
      !contains(github.event.head_commit.message, '[no ci]') &&
      !contains(github.event.head_commit.message, '[skip actions]')
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: cabi-stable
      # v0.4 W4 — build the cdylib + staticlib + rlib (default
      # crate-types) without the regen-header feature.
      - name: cargo build -p gmcrypto-c --release
        run: cargo build -p gmcrypto-c --release
      # Q4.12 — committed header drift gate. Re-run cbindgen and
      # `git diff --exit-code` on the header. Fails CI if a developer
      # added or modified an FFI entry point without regenerating the
      # header. (cbindgen does not evaluate `#[cfg(feature)]`, so the
      # v0.9 AEAD prototypes are emitted regardless of the feature set —
      # regen here without `sm4-aead` reproduces the committed header.)
      - name: Regenerate header via cbindgen
        run: cargo build -p gmcrypto-c --features regen-header
      - name: Verify committed header is up-to-date
        run: git diff --exit-code crates/gmcrypto-c/include/gmcrypto.h
      # The c_smoke integration test exercises every FFI entry point
      # via Rust's own extern "C" interop. This is the v0.4 W4
      # cryptographic-correctness gate (Rust-equivalence on every
      # entry point). Run with and without the AEAD FFI surface.
      - name: cargo test -p gmcrypto-c
        run: cargo test -p gmcrypto-c
      - name: cargo test -p gmcrypto-c --features sm4-aead
        run: cargo test -p gmcrypto-c --features sm4-aead

  deny:
    name: cargo-deny (no forbidden runtime deps)
    runs-on: macos-14
    if: >-
      !contains(github.event.pull_request.title, '[skip ci]') &&
      !contains(github.event.pull_request.title, '[ci skip]') &&
      !contains(github.event.pull_request.title, '[no ci]') &&
      !contains(github.event.pull_request.title, '[skip actions]') &&
      !contains(github.event.head_commit.message, '[skip ci]') &&
      !contains(github.event.head_commit.message, '[ci skip]') &&
      !contains(github.event.head_commit.message, '[no ci]') &&
      !contains(github.event.head_commit.message, '[skip actions]')
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      # Prebuilt cargo-deny binary from GitHub Releases via the curated
      # taiki-e/install-action tool list. Replaces `cargo install --locked
      # cargo-deny`, which compiled from source on every CI run (~3 min).
      - name: Install cargo-deny
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-deny@0.19
      # Default deny pass — gates the zero-runtime-deps surface of the
      # default-features build.
      - name: Run cargo-deny (default features, excluding dev-deps)
        run: cargo deny check --exclude-dev
      # v0.4 W2 / Q4.5 + v0.8 W2-W3 — second pass with the runtime opt-in
      # feature flags a downstream consumer might enable (digest/cipher
      # traits, bitsliced, SIMD, AEAD, scalar). gmcrypto-c's build-time
      # `regen-header` feature is deliberately excluded (cbindgen + its
      # transitive tree is build-tool noise, not runtime dep policy).
      # `sm4-aead` pulls gmcrypto-simd::ghash, which has no new
      # transitive deps.
      - name: Run cargo-deny (runtime opt-in features, excluding dev-deps)
        run: cargo deny --features gmcrypto-core/digest-traits,gmcrypto-core/cipher-traits,gmcrypto-core/sm4-bitsliced,gmcrypto-core/sm4-bitsliced-simd,gmcrypto-core/sm4-aead,gmcrypto-core/crypto-bigint-scalar check --exclude-dev

  wasm32:
    name: build wasm32-unknown-unknown (Rust ${{ matrix.toolchain }})
    runs-on: macos-14
    if: >-
      !contains(github.event.pull_request.title, '[skip ci]') &&
      !contains(github.event.pull_request.title, '[ci skip]') &&
      !contains(github.event.pull_request.title, '[no ci]') &&
      !contains(github.event.pull_request.title, '[skip actions]') &&
      !contains(github.event.head_commit.message, '[skip ci]') &&
      !contains(github.event.head_commit.message, '[ci skip]') &&
      !contains(github.event.head_commit.message, '[no ci]') &&
      !contains(github.event.head_commit.message, '[skip actions]')
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        toolchain: [stable, "1.85"]
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust ${{ matrix.toolchain }}
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ matrix.toolchain }}
          targets: wasm32-unknown-unknown
      # The `targets:` parameter above usually installs the wasm32
      # target for the named toolchain, but `dtolnay/rust-toolchain` has
      # been observed to land the MSRV toolchain without the target
      # (E0463: "can't find crate for `core`"). Belt-and-braces:
      # explicitly add the target against the matrix toolchain.
      - name: Ensure wasm32 target is installed for ${{ matrix.toolchain }}
        run: rustup target add wasm32-unknown-unknown --toolchain ${{ matrix.toolchain }}
      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          key: wasm32-${{ matrix.toolchain }}
      # v0.4 W1 — caller-supplied RNG only; the core crate does NOT pull
      # getrandom's wasm_js backend into its default dep graph. Build with
      # --no-default-features to mirror the no_std + alloc-only posture
      # wasm callers will use.
      - name: cargo +${{ matrix.toolchain }} build --target wasm32-unknown-unknown (no default features)
        run: cargo +${{ matrix.toolchain }} build -p gmcrypto-core --target wasm32-unknown-unknown --no-default-features
      # v0.8 / v0.9 — AEAD must also compile on wasm32 (the GHASH
      # dispatch falls back to the software path; no CLMUL/PMULL there).
      - name: cargo +${{ matrix.toolchain }} build --target wasm32-unknown-unknown --features sm4-aead
        run: cargo +${{ matrix.toolchain }} build -p gmcrypto-core --target wasm32-unknown-unknown --no-default-features --features sm4-aead
