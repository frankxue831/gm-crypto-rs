name: CI

on:
  push:
    branches: [main]
    paths-ignore: ['**/*.md', 'LICENSE', '.gitignore']
  pull_request:
    branches: [main]
    paths-ignore: ['**/*.md', 'LICENSE', '.gitignore']

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"

jobs:
  build:
    name: build & test (Rust ${{ matrix.toolchain }})
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        toolchain: [stable, "1.85"]   # latest stable + MSRV
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust ${{ matrix.toolchain }}
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ matrix.toolchain }}
          components: rustfmt, clippy
      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
      - name: cargo build (all targets, including bench compile-only)
        run: cargo build --workspace --all-targets
      - name: cargo test (tests + doctests; benches excluded — see dudect-pr.yml)
        run: cargo test --workspace
      # v0.4 W2 — RustCrypto-trait fit, opt-in features. Default-features
      # build above already gates the no-extra-deps shape. This run
      # exercises the digest/cipher trait impls + the rustcrypto_traits
      # integration test (which is `required-features`-gated and only
      # builds when both flags are on).
      - name: cargo test --features digest-traits,cipher-traits
        run: cargo test -p gmcrypto-core --features digest-traits,cipher-traits
      # v0.4 W3 — bitsliced SM4 S-box (Q4.9 / Q4.11 in docs/v0.4-scope.md).
      # Default-features build is unchanged; this exercises the opt-in
      # bitsliced path including the exhaustive-vs-table equivalence test
      # in `sm4::sbox_bitsliced::tests::bitsliced_matches_table`.
      - name: cargo test --features sm4-bitsliced
        run: cargo test -p gmcrypto-core --features sm4-bitsliced
      - name: cargo fmt --check
        run: cargo fmt --all -- --check
      - name: cargo clippy
        run: cargo clippy --workspace --all-targets -- -D warnings
      - name: cargo clippy --features digest-traits,cipher-traits
        run: cargo clippy -p gmcrypto-core --features digest-traits,cipher-traits --all-targets -- -D warnings
      - name: cargo clippy --features sm4-bitsliced
        run: cargo clippy -p gmcrypto-core --features sm4-bitsliced --all-targets -- -D warnings

  cabi:
    name: gmcrypto-c FFI build + header drift
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: cabi-stable
      # v0.4 W4 — build the cdylib + staticlib + rlib (default
      # crate-types) without the regen-header feature.
      - name: cargo build -p gmcrypto-c --release
        run: cargo build -p gmcrypto-c --release
      # Q4.12 — committed header drift gate. Re-run cbindgen and
      # `git diff --exit-code` on the header. Fails CI if a developer
      # added or modified an FFI entry point without regenerating the
      # header.
      - name: Regenerate header via cbindgen
        run: cargo build -p gmcrypto-c --features regen-header
      - name: Verify committed header is up-to-date
        run: git diff --exit-code crates/gmcrypto-c/include/gmcrypto.h
      # The c_smoke integration test exercises every FFI entry point
      # via Rust's own extern "C" interop. This is the v0.4 W4
      # cryptographic-correctness gate (Rust-equivalence on every
      # entry point).
      - name: cargo test -p gmcrypto-c
        run: cargo test -p gmcrypto-c

  deny:
    name: cargo-deny (no forbidden runtime deps)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Install cargo-deny
        run: cargo install --locked cargo-deny
      # Default deny pass — gates the zero-runtime-deps surface of the
      # default-features build.
      - name: Run cargo-deny (default features, excluding dev-deps)
        run: cargo deny check --exclude-dev
      # v0.4 W2 / Q4.5 — second pass with the runtime opt-in feature
      # flags (`digest-traits`, `cipher-traits`, and the v0.4 W3
      # `sm4-bitsliced`). These are the features a downstream consumer
      # might enable; gmcrypto-c's `regen-header` build-time feature
      # is deliberately excluded (cbindgen + its ~30-crate transitive
      # tree is build-tool noise, not runtime dep policy). Pulls
      # `digest` / `cipher` / `crypto-common` / `inout` (allowlisted
      # in deny.toml). Uses --features on the workspace-default crate
      # (`gmcrypto-core`); `gmcrypto-c` has no runtime opt-in features.
      - name: Run cargo-deny (runtime opt-in features, excluding dev-deps)
        run: cargo deny --features gmcrypto-core/digest-traits,gmcrypto-core/cipher-traits,gmcrypto-core/sm4-bitsliced check --exclude-dev

  wasm32:
    name: build wasm32-unknown-unknown (Rust ${{ matrix.toolchain }})
    runs-on: ubuntu-latest
    timeout-minutes: 10
    strategy:
      fail-fast: false
      matrix:
        toolchain: [stable, "1.85"]
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust ${{ matrix.toolchain }} with wasm32 target
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ matrix.toolchain }}
          targets: wasm32-unknown-unknown
      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          key: wasm32-${{ matrix.toolchain }}
      # v0.4 W1 — caller-supplied RNG only; the core crate does NOT pull
      # getrandom's wasm_js backend into its default dep graph. Build with
      # --no-default-features to mirror the no_std + alloc-only posture
      # wasm callers will use. The `std` feature is reserved for future
      # file-I/O helpers and is also smoke-built here.
      - name: cargo build --target wasm32-unknown-unknown (no default features)
        run: cargo build -p gmcrypto-core --target wasm32-unknown-unknown --no-default-features
      - name: cargo build --target wasm32-unknown-unknown --features std
        run: cargo build -p gmcrypto-core --target wasm32-unknown-unknown --features std
