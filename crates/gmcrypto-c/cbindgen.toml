# cbindgen configuration for gmcrypto-c.
# Regen via: cargo build -p gmcrypto-c --features regen-header
# (or set GMCRYPTO_C_REGEN_HEADER=1 in the environment).

language = "C"
header = "/*\n * gmcrypto-c — C ABI for gmcrypto-core (pure-Rust SM2/SM3/SM4 SDK).\n *\n * AUTO-GENERATED by cbindgen. DO NOT EDIT BY HAND.\n * Regenerate via: cargo build -p gmcrypto-c --features regen-header\n *\n * Failure-mode invariant (v0.4 W4 / Q4.8 of docs/v0.4-scope.md):\n * every int return is 0 on success, non-zero on failure. Non-zero\n * codes are NOT enumerated — they are equivalent `Failed` per the\n * crate's failure-mode discipline.\n */"
include_guard = "GMCRYPTO_H_"
autogen_warning = "/* Warning: this file is auto-generated by cbindgen; do not edit. */"
no_includes = false
sys_includes = ["stddef.h", "stdint.h"]
style = "type"
documentation = true
documentation_style = "c"

[export]
prefix = ""

[export.rename]
# Use snake_case-friendly C names for opaque handle types.

[fn]
prefix = ""
postfix = ""
args = "auto"
rename_args = "snake_case"
must_use = ""

[enum]
prefix_with_name = true
rename_variants = "ScreamingSnakeCase"

[struct]
rename_fields = "snake_case"

[parse]
parse_deps = false
extra_bindings = []

[parse.expand]
crates = []
