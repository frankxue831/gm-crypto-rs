# cargo-deny configuration for gm-crypto-rs.
#
# Hard rule: gmcrypto-core ships only crypto-bigint, subtle, zeroize,
# rand_core, spin in its NORMAL + BUILD dep classes. Dev-deps (dudect-bencher,
# getrandom, hex-literal) are unrestricted because they don't reach downstream
# consumers.

[graph]
all-features = false
no-default-features = false

[advisories]
db-path = "~/.cargo/advisory-db"
db-urls = ["https://github.com/rustsec/advisory-db"]
yanked = "deny"
ignore = []

[licenses]
allow = ["Apache-2.0", "MIT", "BSD-3-Clause", "Unicode-3.0"]
confidence-threshold = 0.8

[bans]
multiple-versions = "warn"
wildcards = "deny"
# Allow workspace-internal `{ path = "..." }` deps without a `version`
# field; the workspace internal-path graph is naturally wildcard.
allow-wildcard-paths = true
highlight = "all"
# v0.4 W4 — `cbindgen` is a build-time-only optional dep of
# `gmcrypto-c` (gated on the `regen-header` feature). Its transitive
# tree (~30 crates: syn, serde, toml, etc.) is irrelevant to runtime
# consumers and would bloat this allow-list with crates that never
# ship in a release binary. Skip its subtree entirely.
skip-tree = [
    { name = "cbindgen" },
]

# Allowed normal+build deps in gmcrypto-core's tree. Anything else fails CI.
allow = [
    # The workspace's own crate.
    { name = "gmcrypto-core" },

    # Direct deps of gmcrypto-core.
    { name = "crypto-bigint" },
    { name = "subtle" },
    { name = "zeroize" },
    { name = "zeroize_derive" },
    { name = "rand_core" },
    # v0.3 W6 — `spin::Once` for the comb-table runtime init. Per
    # Q7.8 in docs/v0.3-scope.md, this is the no_std-compatible
    # runtime-init primitive selected over `std::sync::LazyLock`
    # (forbidden in no_std) and `once_cell::race::OnceBox`. Loaded
    # with the `once` feature only — no spinlock/mutex paths.
    { name = "spin" },

    # v0.4 W2 — opt-in RustCrypto-trait fit. Per Q4.4 / Q4.5 in
    # docs/v0.4-scope.md, these are pulled ONLY when the
    # `digest-traits` / `cipher-traits` feature flags are enabled by
    # the consumer; default-features build pulls none of them in.
    # CI runs `cargo deny check --exclude-dev` (default features) AND
    # `cargo deny check --all-features --exclude-dev` (this path).
    # Migrated to the digest 0.11 / cipher 0.5 line in v0.11 (the
    # crypto-common 0.2 / hybrid-array generation).
    { name = "digest" },
    { name = "cipher" },
    # Transitive deps shared by digest / cipher via crypto-common 0.2.
    { name = "crypto-common" },
    { name = "inout" },
    # Build-time helper of generic-array. Post-v0.11 the digest/cipher
    # path uses hybrid-array, not generic-array; generic-array (and this
    # helper) now reach the tree only via crypto-bigint.
    { name = "version_check" },

    # v0.4 W4 — `gmcrypto-c` workspace member (FFI shim crate).
    # The cdylib + staticlib depend on gmcrypto-core + getrandom
    # + rand_core. getrandom (a dev-dep of gmcrypto-core) becomes a
    # normal dep of gmcrypto-c for its sign / encrypt RNG sourcing
    # path, pulling in its platform-specific transitive tree
    # (cfg-if, libc on Linux/macOS, r-efi / wasip2 / wasip3 /
    # wit-bindgen on UEFI / WASI targets — getrandom's default
    # `sys_rng` feature decides at compile-time).
    { name = "gmcrypto-c" },
    { name = "getrandom" },
    { name = "cfg-if" },
    { name = "libc" },
    { name = "r-efi" },
    { name = "wasip2" },
    { name = "wasip3" },
    { name = "wit-bindgen" },

    # v0.5 W4 phase 2 — `gmcrypto-simd` workspace member (SIMD backend
    # crate, rlib-only). Carries the AVX2 8-way packed bitsliced SM4
    # S-box (and NEON in phase 3); quarantines the unavoidable
    # `unsafe` of SIMD intrinsics so `gmcrypto-core` itself can stay
    # `unsafe_code = "forbid"`. Mirrors the `gmcrypto-c` posture in
    # this allow-list. Only reachable from a downstream consumer
    # when they enable `gmcrypto-core`'s `sm4-bitsliced-simd` feature.
    { name = "gmcrypto-simd" },
    # v0.5 W4 phase 2 — runtime AVX2 detection (RustCrypto, no_std-OK,
    # cached after first call via a `Once`-protected static).
    # Replaces the scope-doc Q5.11 mention of
    # `is_x86_feature_detected!` (a `std` macro, incompatible with
    # our no_std posture). See `docs/v0.5-scope.md` Q5.11 addendum.
    { name = "cpufeatures" },

    # Transitive deps of crypto-bigint.
    { name = "cpubits" },
    { name = "ctutils" },
    { name = "cmov" },
    { name = "num-traits" },
    { name = "hybrid-array" },
    { name = "generic-array" },
    { name = "typenum" },

    # Transitive build helper of num-traits (dev-dep elevated to build via cfg).
    { name = "autocfg" },

    # Proc-macro support, transitive from zeroize_derive.
    { name = "syn" },
    { name = "quote" },
    { name = "proc-macro2" },
    { name = "unicode-ident" },

    # Other transitive support that may appear depending on platform/version.
    { name = "subtle-derive" },
    { name = "rustc_version" },
    { name = "semver" },
]

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
